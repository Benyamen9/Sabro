name: sabro-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Sabro.slnx

      - name: Build
        run: dotnet build Sabro.slnx --no-restore --configuration Release

      - name: Verify OpenAPI spec is up to date
        # The build emits frontend/openapi/Sabro.API.json via
        # Microsoft.Extensions.ApiDescription.Server. Fail if the committed
        # spec drifts from what the current sources produce — forces backend
        # DTO changes to be paired with a regenerated spec.
        run: git diff --exit-code frontend/openapi/Sabro.API.json

      - name: Format check
        run: dotnet format Sabro.slnx --verify-no-changes --no-restore

      - name: Unit tests
        run: dotnet test tests/Sabro.UnitTests/Sabro.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=unit.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Integration tests
        run: dotnet test tests/Sabro.IntegrationTests/Sabro.IntegrationTests.csproj --no-build --configuration Release --logger "trx;LogFileName=integration.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./TestResults/*.trx

  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        # --legacy-peer-deps works around a known npm 10.x bug where optional
        # peerDependencies (e.g. @bomb.sh/tab declaring cac@^6.7.14 and
        # commander@^13.1.0 as optional peers) are incorrectly required by
        # `npm ci`. npm 11+ handles this correctly, but Node 22.22.x on the
        # runner ships with npm 10.
        run: npm ci --legacy-peer-deps

      - name: Verify generated API types are up to date
        # Regenerate api.generated.ts from the committed OpenAPI spec and
        # fail if it differs from the committed file. Catches the case where
        # someone updates the spec but forgets to regenerate types.
        run: |
          npm run generate:api-types
          git diff --exit-code types/api.generated.ts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
