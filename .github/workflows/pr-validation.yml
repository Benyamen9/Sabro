name: pr-validation

on:
  pull_request:
    branches: [main, develop]

jobs:
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Dependabot's fixed "chore(deps): Bump …" wording can't be configured
      # down to a lowercase subject, so its PRs skip the two convention checks
      # (the job itself still runs, keeping the required check green). Ritual
      # when merging one: retitle it lowercase first, so the squash commit on
      # main keeps the convention.
      - name: Validate PR title
        if: github.actor != 'dependabot[bot]'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            style
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

      - name: Validate commit messages
        if: github.actor != 'dependabot[bot]'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
