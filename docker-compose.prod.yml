name: sabro-prod

# Production stack for the Sabro ecosystem hub on a single VPS (Hetzner CPX32).
# All services co-located behind Caddy. Images for the API/frontend/migrator are
# built in CI and pulled from GHCR (never built on the VPS). Secrets come from a
# `.env` next to this file on the VPS (see .env.prod.example) — never committed.
#
# Deploy order enforced by depends_on:
#   postgres (healthy) -> migrator (runs to completion) -> api -> caddy
#
# Bring up:  docker compose -f docker-compose.prod.yml up -d
# Migrate:   handled automatically by the `migrator` one-shot before `api` starts
#            (CD also runs it explicitly before swapping app containers).

services:
  postgres:
    image: postgres:17-alpine
    container_name: sabro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sabro}
      POSTGRES_USER: ${POSTGRES_USER:-sabro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Match dev: ICU locale provider for language-agnostic Unicode sorting.
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=und-x-icu --locale=C.UTF-8 --encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sabro} -d ${POSTGRES_DB:-sabro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: sabro-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
      MEILI_ENV: production
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      # Use 127.0.0.1, not localhost: inside this image localhost resolves to
      # IPv6 ::1 but Meilisearch binds IPv4 0.0.0.0 only, so a localhost probe
      # gets connection-refused and the container is wrongly marked unhealthy.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  seq:
    image: datalust/seq:latest
    container_name: sabro-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq-data:/data
    networks: [internal]

  logto-db:
    image: postgres:17-alpine
    container_name: sabro-logto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: logto
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: ${LOGTO_DB_PASSWORD:?LOGTO_DB_PASSWORD is required}
    volumes:
      - logto-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto -d logto"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  logto:
    image: svhd/logto:latest
    container_name: sabro-logto
    restart: unless-stopped
    depends_on:
      logto-db:
        condition: service_healthy
    environment:
      DB_URL: postgresql://logto:${LOGTO_DB_PASSWORD}@logto-db:5432/logto
      # Public HTTPS endpoints (served through Caddy). OIDC issuer must match.
      ENDPOINT: https://${LOGTO_DOMAIN}
      ADMIN_ENDPOINT: https://${LOGTO_ADMIN_DOMAIN}
      # Caddy terminates TLS and proxies to Logto over plain HTTP. Trust the
      # X-Forwarded-Proto header so Logto resolves the request origin as https
      # and matches ENDPOINT / ADMIN_ENDPOINT — otherwise the admin console
      # 404s ("page not found") behind the proxy.
      TRUST_PROXY_HEADER: "true"
    entrypoint:
      - sh
      - -c
      - "npm run cli db seed -- --swe && npm start"
    networks: [internal]

  # One-shot: applies every module's EF Core migrations, then exits. Behind the
  # "migrate" profile so it does NOT start with a plain `up -d`; CD runs it
  # explicitly before swapping app containers:
  #   docker compose -f docker-compose.prod.yml --profile migrate run --rm migrator
  migrator:
    image: ghcr.io/${GHCR_OWNER:-benyamen9}/sabro-migrator:${SABRO_IMAGE_TAG:-latest}
    container_name: sabro-migrator
    profiles: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Sabro: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sabro};Username=${POSTGRES_USER:-sabro};Password=${POSTGRES_PASSWORD}"
    networks: [internal]

  api:
    image: ghcr.io/${GHCR_OWNER:-benyamen9}/sabro-api:${SABRO_IMAGE_TAG:-latest}
    container_name: sabro-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Sabro: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sabro};Username=${POSTGRES_USER:-sabro};Password=${POSTGRES_PASSWORD}"
      Logto__Authority: "https://${LOGTO_DOMAIN}/oidc"
      Logto__Audience: ${SABRO_API_RESOURCE:?SABRO_API_RESOURCE is required}
      # Machine-to-machine app with Logto Management API access, used by account
      # deletion to erase the caller's identity. Blank => deletion disabled.
      Logto__ManagementApi__ClientId: ${LOGTO_MANAGEMENT_CLIENT_ID:-}
      Logto__ManagementApi__ClientSecret: ${LOGTO_MANAGEMENT_CLIENT_SECRET:-}
      Meilisearch__Url: "http://meilisearch:7700"
      Meilisearch__MasterKey: ${MEILI_MASTER_KEY}
      # Browser-client origins allowed to call /api/v1 directly (hub + Meltho).
      Cors__AllowedOrigins__0: "https://${SABRO_DOMAIN}"
      Cors__AllowedOrigins__1: "https://${MELTHO_DOMAIN:-localhost}"
      # Ship structured logs to the co-located Seq.
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    networks: [internal]

  frontend:
    image: ghcr.io/${GHCR_OWNER:-benyamen9}/sabro-frontend:${SABRO_IMAGE_TAG:-latest}
    container_name: sabro-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_LOGTO_ENDPOINT: "https://${LOGTO_DOMAIN}"
      NUXT_LOGTO_APP_ID: ${NUXT_LOGTO_APP_ID:?NUXT_LOGTO_APP_ID is required}
      NUXT_LOGTO_APP_SECRET: ${NUXT_LOGTO_APP_SECRET:?NUXT_LOGTO_APP_SECRET is required}
      NUXT_LOGTO_COOKIE_ENCRYPTION_KEY: ${NUXT_LOGTO_COOKIE_ENCRYPTION_KEY:?NUXT_LOGTO_COOKIE_ENCRYPTION_KEY is required}
      NUXT_PUBLIC_LOGTO_ENDPOINT: "https://${LOGTO_DOMAIN}"
      NUXT_PUBLIC_SABRO_API_RESOURCE: ${SABRO_API_RESOURCE}
      NUXT_PUBLIC_API_BASE_URL: "https://${SABRO_API_DOMAIN}/api/v1"
      # Shared cookie domain so locale + Syriac-script preferences carry across
      # the ecosystem (sabro.be + meltho.sabro.be + future apps). Must match the
      # value baked into the image at build time (CD build-arg).
      NUXT_PUBLIC_COOKIE_DOMAIN: "${COOKIE_DOMAIN:-.sabro.be}"
    networks: [internal]

  # Meltho — Syriac word game. Lives in its own repo (Hito/Meltho) and is built
  # into its own GHCR image, but runs as another container in this shared stack
  # behind the same Caddy, reading content + writing play results through the
  # Sabro API. It is its own Logto OIDC app (MELTHO_LOGTO_*), distinct from the
  # hub's. NUXT_PUBLIC_SABRO_API_RESOURCE is baked into the image at build time
  # (Meltho's CD passes it as a build arg); the value here must match.
  meltho:
    image: ghcr.io/${GHCR_OWNER:-benyamen9}/meltho:${MELTHO_IMAGE_TAG:-latest}
    container_name: sabro-meltho
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_LOGTO_ENDPOINT: "https://${LOGTO_DOMAIN}"
      NUXT_LOGTO_APP_ID: ${MELTHO_LOGTO_APP_ID:?MELTHO_LOGTO_APP_ID is required}
      NUXT_LOGTO_APP_SECRET: ${MELTHO_LOGTO_APP_SECRET:?MELTHO_LOGTO_APP_SECRET is required}
      NUXT_LOGTO_COOKIE_ENCRYPTION_KEY: ${MELTHO_LOGTO_COOKIE_ENCRYPTION_KEY:?MELTHO_LOGTO_COOKIE_ENCRYPTION_KEY is required}
      NUXT_PUBLIC_LOGTO_ENDPOINT: "https://${LOGTO_DOMAIN}"
      NUXT_PUBLIC_SABRO_API_RESOURCE: ${SABRO_API_RESOURCE}
      NUXT_PUBLIC_API_BASE_URL: "https://${SABRO_API_DOMAIN}/api/v1"
      # Same shared cookie domain as the hub frontend — this is what makes the
      # locale + script choice carry between Sabro and Meltho.
      NUXT_PUBLIC_COOKIE_DOMAIN: "${COOKIE_DOMAIN:-.sabro.be}"
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    container_name: sabro-caddy
    restart: unless-stopped
    depends_on:
      - api
      - frontend
      - logto
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required}
      SABRO_DOMAIN: ${SABRO_DOMAIN}
      SABRO_API_DOMAIN: ${SABRO_API_DOMAIN}
      LOGTO_DOMAIN: ${LOGTO_DOMAIN}
      LOGTO_ADMIN_DOMAIN: ${LOGTO_ADMIN_DOMAIN}
      MELTHO_DOMAIN: ${MELTHO_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  meilisearch-data:
  seq-data:
  logto-db-data:
  caddy-data:
  caddy-config:
